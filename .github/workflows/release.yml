name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: |
          version="${GITHUB_REF_NAME}"
          build_time="$(date -u +%Y-%m-%d_%H:%M:%S)"
          ldflags="-X 'main._VERSION=${version}' -X 'main._BUILD_TIME=${build_time}'"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          mkdir -p dist
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            binary="elastic-ci-executor-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then binary="${binary}.exe"; fi

            echo "Building ${binary}..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "$ldflags" -o "dist/${binary}" ./cmd/executor
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
